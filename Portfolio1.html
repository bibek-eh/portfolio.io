<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        .navbar {
            background-color: rgb(122, 225, 243);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }

        .logo {
            font-size: 50px;
        }

        .logo a,
        .nav a {
            text-decoration: none;
            color: black;
        }

        .nav {
            display: flex;
            font-size: 20px;
        }

        .nav li {
            list-style: none;
            margin: 0 15px;
        }

        a:hover {
            text-decoration: underline;
        }

        .main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 50px;
            gap: 30px;
        }

        .written {
            max-width: 650px;
            min-width: 400px;
        }

        .hello {
            font-size: 45px;
            color: black;
        }

        .words {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            font-size: 55px;
            margin-top: 10px;
        }

        .s-e {
            color: blue;
            display: inline-block;
        }

        .img {
            width: 500px;
            height: 560px;
            border-radius: 10%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .buttons {
            padding: 0 50px 50px;
        }

        .buttons button {
            background-color: rgb(188, 188, 211);
            color: black;
            padding: 10px 20px;
            margin-right: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .buttons button:hover {
            background-color: rgb(165, 165, 190);
        }

        .footer {
            background-color: rgb(147, 233, 248);
            color: black;
            font-size: 30px;
            text-align: center;
            padding: 20px;
        }

        .links {
            margin-bottom: 10px;
        }

        .links a {
            color: black;
            font-size: 40px;
            margin: 0 15px;
            text-decoration: none;
        }

        #typing-text::after {
            content: "|";
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @media (max-width: 900px) {
            .main {
                flex-direction: column-reverse;
                text-align: center;
            }

            .written {
                min-width: auto;
            }

            .words {
                justify-content: center;
                font-size: 40px;
            }

            .hello {
                font-size: 35px;
            }

            .img {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="#">BDD</a>
            </div>

            <ul class="nav">
                <li><a href="#">Home</a></li>
                <!-- <li><a href="#">Project</a></li> -->
                <li><a href="#">About Me</a></li>
                <li><a href="https://forms.gle/mFUaCiUNmmkKrW7s5">Contact Me</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="main">

            <div class="written">
                <div class="hello">
                    Hello!! <br>
                    I am Bibek Dhawal Dhobi
                </div>

                <div class="words">
                    <span>I am a&nbsp;</span>
                    <span class="s-e" id="typing-text"></span>
                </div>
            </div>

            <div class="img">
                <img src="pp pic 1.jpeg" alt="Profile Picture">
            </div>

        </div>

        <div class="buttons">
            <button>About Me</button>
            <a href="https://www.instagram.com/exclusive_banda0/" target="_blank">
            <button>Follow Me</button></a>
        </div>
    </main>

    <footer>
        <div class="footer">

            <div class="links">
                <a href="https://www.facebook.com/bibek.dhawal.31" target="_blank">
                    <i class="fa-brands fa-facebook"></i>
                </a>

                <a href="https://web.whatsapp.com/" target="_blank">
                    <i class="fa-brands fa-square-whatsapp"></i>
                </a>

                <a href="https://www.youtube.com/@programmers_bd" target="_blank">
                    <i class="fa-brands fa-youtube"></i>
                </a>
            </div>

            <div class="word">
                Copyright &copy; 2026 | All Rights Reserved
            </div>

        </div>
    </footer>

    <script>
        const textElement = document.getElementById('typing-text');
        const text = "Software Developer";

        let index = 0;
        let isDeleting = false;

        function typeEffect() {

            textElement.textContent = text.slice(0, index);

            if (!isDeleting && index < text.length) {
                index++;
            } else if (isDeleting && index > 0) {
                index--;
            }

            if (index === text.length) {
                isDeleting = true;
                setTimeout(typeEffect, 1000);
                return;
            }

            if (index === 0 && isDeleting) {
                isDeleting = false;
            }

            setTimeout(typeEffect, isDeleting ? 70 : 150);
        }

        typeEffect();
    </script>

</body>
</html>
