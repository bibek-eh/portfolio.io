<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bibek Dhawal Dhobi | Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
            overflow-x: hidden;
        }

        /* Animated Background */

        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Navbar */

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #00d9ff;
            text-shadow: 0 0 20px #00d9ff;
        }

        .logo span {
            color: white;
        }

        .nav {
            display: flex;
            gap: 30px;
        }

        .nav a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: .4s;
        }

        .nav a:hover {
            color: #00d9ff;
            text-shadow: 0 0 15px #00d9ff;
        }

        /* Hero Section */

        .main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px 8%;
            min-height: 85vh;
            gap: 50px;
            flex-wrap: wrap;
        }

        .written {
            max-width: 700px;
        }

        .hello {
            font-size: 1.5rem;
            color: #00d9ff;
            margin-bottom: 10px;
        }

        .name {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .words {
            font-size: 2rem;
            font-weight: 600;
        }

        .s-e {
            color: #00d9ff;
            text-shadow: 0 0 15px #00d9ff;
        }

        .description {
            margin-top: 20px;
            line-height: 1.8;
            color: #cfcfcf;
        }

        /* Buttons */

        .buttons {
            margin-top: 35px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: .4s;
        }

        .primary {
            background: #00d9ff;
            color: black;
            font-weight: 600;
        }

        .primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px #00d9ff;
        }

        .secondary {
            background: transparent;
            border: 2px solid #00d9ff;
            color: #00d9ff;
        }

        .secondary:hover {
            background: #00d9ff;
            color: black;
            box-shadow: 0 0 25px #00d9ff;
        }

        /* Profile Card */

        .img {
            width: 400px;
            height: 500px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.2);
            animation: float 4s ease-in-out infinite;
        }

        .img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* Social */

        .footer {
            text-align: center;
            padding: 40px;
            background: #111;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .links {
            margin-bottom: 20px;
        }

        .links a {
            color: white;
            font-size: 28px;
            margin: 0 15px;
            transition: .4s;
        }

        .links a:hover {
            color: #00d9ff;
            text-shadow: 0 0 20px #00d9ff;
        }

        .footer p {
            color: #bdbdbd;
        }

        /* Typing Cursor */

        #typing-text::after {
            content: "|";
            animation: blink .8s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }


        @media(max-width:900px) {

            .main {
                flex-direction: column-reverse;
                text-align: center;
            }

            .name {
                font-size: 2.8rem;
            }

            .words {
                justify-content: center;
            }

            .img {
                width: 300px;
                height: 380px;
            }

            .nav {
                display: none;
            }

        }
    </style>
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            BDD<span></span>

            <a href="#">Home</a>

            <a href="https://forms.gle/mFUaCiUNmmkKrW7s5">Contact</a>
        </div>

    </nav>

    <section class="main">

        <div class="written">

            <h3 class="hello">HELLO THERE 👋</h3>

            <h1 class="name">
                Bibek Dhawal Dhobi
            </h1>

            <div class="words">
                I am a&nbsp;
                <span id="typing-text" class="s-e"></span>
            </div>

            <p class="description">
                Passionate software developer focused on building modern,
                responsive and futuristic digital experiences. I enjoy
                web development, UI/UX design, programming and exploring

            <div class="buttons">

                <button class="btn primary">

    <footer class="footer">

        <div class="links">

            <a href="https://github.com/bibek-eh"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/bibek-dhawal-084286414?utm_source=share_via&utm_content=profile&utm_medium=member_android"><i class="fab fa-linkedin"></i></a>
            <a href="https://www.instagram.com/exclusive_banda0/"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/bibek.dhawal.31"><i class="fab fa-facebook"></i></a>

        </div>

        <p>
            Copyright © 2026 | All Rights Reserved

    <script>

        const textElement =
            document.getElementById("typing-text");

        const texts = [
            "Ethical Hacker",
            "Web Developer",
            "Programmer",
            "Tech Enthusiast"
        ];

        let textIndex = 0;
        let charIndex = 0;
        let deleting = false;

        function typeEffect() {

            let currentText = texts[textIndex];

            if (!deleting) {

                textElement.textContent =
                    currentText.substring(0, charIndex++);

                if (charIndex > currentText.length) {

                    deleting = true;

                    setTimeout(typeEffect, 1200);

                    return;
                }

            }
            else {

                textElement.textContent =
                    currentText.substring(0, charIndex--);

                if (charIndex < 0) {

                    deleting = false;

                    textIndex =
                        (textIndex + 1) % texts.length;
                }
            }

            setTimeout(typeEffect,
                deleting ? 70 : 120);

        }

        typeEffect();

    </script>

</body>

</html>
