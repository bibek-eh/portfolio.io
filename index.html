    <script>

        const textElement =
            document.getElementById("typing-text");

        const texts = [
            "Ethical Hacker",
            "Web Developer",
            "Programmer",
            "Tech Enthusiast"
        ];

        let textIndex = 0;
        let charIndex = 0;
        let deleting = false;

        function typeEffect() {

            let currentText = texts[textIndex];

            if (!deleting) {

                textElement.textContent =
                    currentText.substring(0, charIndex++);

                if (charIndex > currentText.length) {

                    deleting = true;

                    setTimeout(typeEffect, 1200);

                    return;
                }

            }
            else {

                textElement.textContent =
                    currentText.substring(0, charIndex--);

                if (charIndex < 0) {

                    deleting = false;

                    textIndex =
                        (textIndex + 1) % texts.length;
                }
            }

            setTimeout(typeEffect,
                deleting ? 70 : 120);

        }

        typeEffect();

    </script>

    <!-- Robotic Mouse Script -->
    <script>
    (function() {
        const canvas = document.getElementById('dragonCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const mouse = { x: canvas.width / 2, y: canvas.height / 2 };
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Spine: head(0) + body segments + tail
        const BODY_SEGS = 8;
        const TAIL_SEGS = 14;
        const TOTAL_SEGS = 1 + BODY_SEGS + TAIL_SEGS;
        const SEG_LEN = 13;

        const spine = [];
        for (let i = 0; i < TOTAL_SEGS; i++) {
            spine.push({ x: canvas.width / 2, y: canvas.height / 2 + i * SEG_LEN });
        }

        let walkPhase = 0;
        let glowPulse = 0;
        let blinkTimer = 0;
        let isBlinking = false;

        function lerp(a, b, t) { return a + (b - a) * t; }

        function updateSpine() {
            spine[0].x = lerp(spine[0].x, mouse.x, 0.13);
            spine[0].y = lerp(spine[0].y, mouse.y, 0.13);
            for (let i = 1; i < TOTAL_SEGS; i++) {
                const dx = spine[i].x - spine[i - 1].x;
                const dy = spine[i].y - spine[i - 1].y;
                const d = Math.sqrt(dx * dx + dy * dy) || 1;
                spine[i].x = spine[i - 1].x + (dx / d) * SEG_LEN;
                spine[i].y = spine[i - 1].y + (dy / d) * SEG_LEN;
            }
        }

        function segAngle(i) {
            const a = spine[Math.max(0, i - 1)];
            const b = spine[Math.min(TOTAL_SEGS - 1, i + 1)];
            return Math.atan2(b.y - a.y, b.x - a.x);
        }

        // White plastic body plate
        function drawBodyPlate(x, y, angle, w, h) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            // Main white shell
            ctx.beginPath();
            ctx.roundRect(-w/2, -h/2, w, h, 3);
            ctx.fillStyle = 'rgba(220,235,240,0.18)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(180,220,235,0.45)';
            ctx.lineWidth = 0.8;
            ctx.stroke();
            // Rib line (skeleton detail)
            ctx.strokeStyle = 'rgba(0,217,255,0.2)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(-w/2+2, 0);
            ctx.lineTo(w/2-2, 0);
            ctx.stroke();
            ctx.restore();
        }

        // Skeleton rib strut on each side
        function drawRib(x, y, angle, side, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            const sy = side * size * 0.5;
            const ey = side * (size * 1.1);
            const ex = size * 0.5;
            ctx.beginPath();
            ctx.moveTo(0, sy);
            ctx.quadraticCurveTo(ex, ey, ex * 0.4, ey * 1.1);
            ctx.strokeStyle = 'rgba(0,217,255,0.35)';
            ctx.lineWidth = 1;
            ctx.stroke();
            // Tiny joint circle
            ctx.beginPath();
            ctx.arc(0, sy, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,217,255,0.5)';
            ctx.fill();
            ctx.restore();
        }

        // Orange accent screw (like in image)
        function drawScrew(x, y, r) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,120,0,0.7)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,160,40,0.9)';
            ctx.lineWidth = 0.7;
            ctx.stroke();
            // Cross slot
            ctx.strokeStyle = 'rgba(180,60,0,0.8)';
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(x - r * 0.6, y);
            ctx.lineTo(x + r * 0.6, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y - r * 0.6);
            ctx.lineTo(x, y + r * 0.6);
            ctx.stroke();
        }

        // Articulated leg with 3 joints
        function drawLeg(hipX, hipY, bodyAngle, side, phase) {
            const perp = bodyAngle + Math.PI / 2 * side;
            // Hip socket
            const hx = hipX + Math.cos(perp) * 9;
            const hy = hipY + Math.sin(perp) * 9;

            const swing = Math.sin(phase) * 12;
            const lift  = Math.abs(Math.sin(phase)) * 6;

            // Upper leg direction: mostly down + forward swing
            const upperAng = perp + 0.7 + swing * 0.04;
            const kx = hx + Math.cos(upperAng) * 14;
            const ky = hy + Math.sin(upperAng) * 14 - lift;

            // Lower leg
            const lowerAng = upperAng + 0.9;
            const fx = kx + Math.cos(lowerAng) * 12;
            const fy = ky + Math.sin(lowerAng) * 12 + lift * 0.5;

            // Draw upper leg — white plastic rod
            ctx.beginPath();
            ctx.moveTo(hx, hy);
            ctx.lineTo(kx, ky);
            ctx.strokeStyle = 'rgba(210,230,240,0.55)';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();
            // Skeleton inner line
            ctx.beginPath();
            ctx.moveTo(hx, hy);
            ctx.lineTo(kx, ky);
            ctx.strokeStyle = 'rgba(0,217,255,0.25)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Draw lower leg
            ctx.beginPath();
            ctx.moveTo(kx, ky);
            ctx.lineTo(fx, fy);
            ctx.strokeStyle = 'rgba(200,225,235,0.5)';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(kx, ky);
            ctx.lineTo(fx, fy);
            ctx.strokeStyle = 'rgba(0,217,255,0.2)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // Knee joint
            ctx.beginPath();
            ctx.arc(kx, ky, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,217,255,0.5)';
            ctx.fill();

            // Hip joint
            ctx.beginPath();
            ctx.arc(hx, hy, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(180,210,230,0.6)';
            ctx.fill();

            // Tiny paw (3 dots)
            for (let t = -1; t <= 1; t++) {
                const pa = lowerAng + t * 0.3;
                ctx.beginPath();
                ctx.arc(fx + Math.cos(pa) * 3, fy + Math.sin(pa) * 3, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(180,210,230,0.55)';
                ctx.fill();
            }
        }

        function drawHead(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            const glow = 0.5 + 0.5 * Math.sin(glowPulse);

            // Subtle glow halo
            const aura = ctx.createRadialGradient(4, 0, 2, 4, 0, 32);
            aura.addColorStop(0, `rgba(0,217,255,${0.05 + glow * 0.04})`);
            aura.addColorStop(1, 'rgba(0,217,255,0)');
            ctx.beginPath();
            ctx.arc(4, 0, 32, 0, Math.PI * 2);
            ctx.fillStyle = aura;
            ctx.fill();

            // Neck connector
            ctx.beginPath();
            ctx.roundRect(-10, -6, 12, 12, 3);
            ctx.fillStyle = 'rgba(200,225,235,0.2)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,217,255,0.3)';
            ctx.lineWidth = 0.7;
            ctx.stroke();

            // Main head dome — round mouse head
            ctx.beginPath();
            ctx.ellipse(6, 0, 18, 14, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(210,232,240,0.22)';
            ctx.fill();
            ctx.strokeStyle = `rgba(180,220,235,${0.55 + glow * 0.2})`;
            ctx.lineWidth = 1;
            ctx.stroke();

            // Snout — rounded protrusion
            ctx.beginPath();
            ctx.ellipse(22, 2, 8, 6, 0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(200,225,235,0.2)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(180,215,230,0.5)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // Nose tip
            ctx.beginPath();
            ctx.arc(29, 2, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,217,255,${0.5 + glow * 0.4})`;
            ctx.fill();

            // Whiskers
            const wAlpha = 0.25 + glow * 0.1;
            for (let w = -1; w <= 1; w += 2) {
                for (let k = 0; k < 3; k++) {
                    const wa = w * (0.1 + k * 0.15);
                    const wl = 18 + k * 4;
                    ctx.beginPath();
                    ctx.moveTo(24, w * 2);
                    ctx.lineTo(24 + Math.cos(wa) * wl, w * 2 + Math.sin(wa) * wl);
                    ctx.strokeStyle = `rgba(200,230,240,${wAlpha})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }

            // Eye
            const eyeOpen = isBlinking ? 0.08 : 1;
            // Eye socket
            ctx.beginPath();
            ctx.arc(10, -4, 7, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(5,10,15,0.9)';
            ctx.fill();
            ctx.strokeStyle = `rgba(0,217,255,${0.5 + glow * 0.3})`;
            ctx.lineWidth = 1;
            ctx.stroke();

            if (!isBlinking) {
                // Iris glow
                ctx.beginPath();
                ctx.ellipse(10, -4, 4.5, 4.5 * eyeOpen, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,200,255,${0.55 + glow * 0.3})`;
                ctx.fill();
                // Pupil
                ctx.beginPath();
                ctx.ellipse(10, -4, 2, 2.5 * eyeOpen, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                // Specular
                ctx.beginPath();
                ctx.arc(12, -5.5, 1.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200,240,255,${0.6 + glow * 0.3})`;
                ctx.fill();
            } else {
                // Blink line
                ctx.beginPath();
                ctx.moveTo(4, -4);
                ctx.lineTo(16, -4);
                ctx.strokeStyle = 'rgba(0,217,255,0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Ear — large round mouse ear, left side
            ctx.beginPath();
            ctx.ellipse(-4, -16, 10, 10, -0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(200,225,235,0.18)';
            ctx.fill();
            ctx.strokeStyle = `rgba(180,220,235,0.5)`;
            ctx.lineWidth = 1;
            ctx.stroke();
            // Inner ear
            ctx.beginPath();
            ctx.ellipse(-4, -16, 6, 6, -0.2, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0,217,255,0.25)';
            ctx.lineWidth = 0.6;
            ctx.stroke();
            // Ear circuit dot
            ctx.beginPath();
            ctx.arc(-4, -16, 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,217,255,${0.2 + glow * 0.2})`;
            ctx.fill();

            // Orange screw on head
            drawScrew(2, 6, 2.5);

            // Panel detail lines
            ctx.strokeStyle = 'rgba(0,217,255,0.18)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(-2, -3);
            ctx.lineTo(8, -3);
            ctx.stroke();

            ctx.restore();
        }

        function drawTail(x, y, angle, t) {
            // t = 0 at tail start, 1 at end — taper
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            const r = lerp(2.5, 0.5, t);
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180,215,230,${lerp(0.35, 0.1, t)})`;
            ctx.fill();
            ctx.restore();
        }

        function drawMouse() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            walkPhase += 0.08;
            glowPulse += 0.04;
            blinkTimer++;
            if (blinkTimer > 180 && !isBlinking) { isBlinking = true; blinkTimer = 0; }
            if (isBlinking && blinkTimer > 7) { isBlinking = false; blinkTimer = 0; }

            // --- Draw tail segments (last TAIL_SEGS) ---
            for (let i = TOTAL_SEGS - 1; i >= 1 + BODY_SEGS; i--) {
                const t = (i - (1 + BODY_SEGS)) / TAIL_SEGS;
                const angle = segAngle(i);
                drawTail(spine[i].x, spine[i].y, angle, t);
                // Segment connector line
                if (i < TOTAL_SEGS - 1) {
                    ctx.beginPath();
                    ctx.moveTo(spine[i].x, spine[i].y);
                    ctx.lineTo(spine[i + 1].x, spine[i + 1].y);
                    ctx.strokeStyle = `rgba(170,210,230,${lerp(0.25, 0.05, t)})`;
                    ctx.lineWidth = lerp(2, 0.5, t);
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }
            }

            // --- Draw body segments (1 to BODY_SEGS) back to front ---
            for (let i = BODY_SEGS; i >= 1; i--) {
                const t = i / BODY_SEGS; // 1 at back, 0 at front
                const angle = segAngle(i);
                const w = lerp(24, 16, t);
                const h = lerp(15, 11, t);

                drawBodyPlate(spine[i].x, spine[i].y, angle + Math.PI / 2, w, h);

                // Skeleton ribs on torso segments 2-6
                if (i >= 2 && i <= 6) {
                    drawRib(spine[i].x, spine[i].y, angle + Math.PI / 2, 1, h);
                    drawRib(spine[i].x, spine[i].y, angle + Math.PI / 2, -1, h);
                }

                // Orange screws at specific segments
                if (i === 3 || i === 6) {
                    const a = angle + Math.PI / 2;
                    drawScrew(spine[i].x, spine[i].y, 3);
                }

                // Circuit line pulse along spine
                const pulse = 0.15 + 0.1 * Math.sin(glowPulse * 2 - i * 0.8);
                ctx.beginPath();
                ctx.moveTo(spine[i].x, spine[i].y);
                ctx.lineTo(spine[i - 1].x, spine[i - 1].y);
                ctx.strokeStyle = `rgba(0,217,255,${pulse})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }

            // --- Legs (2 front, 2 back) ---
            // Front legs at body segment 2
            drawLeg(spine[2].x, spine[2].y, segAngle(2), -1, walkPhase + Math.PI);
            drawLeg(spine[2].x, spine[2].y, segAngle(2),  1, walkPhase);
            // Back legs at body segment 6
            drawLeg(spine[6].x, spine[6].y, segAngle(6), -1, walkPhase);
            drawLeg(spine[6].x, spine[6].y, segAngle(6),  1, walkPhase + Math.PI);

            // --- Head ---
            const headAngle = Math.atan2(
                spine[0].y - spine[1].y,
                spine[0].x - spine[1].x
            );
            drawHead(spine[0].x, spine[0].y, headAngle);

            requestAnimationFrame(animLoop);
        }

        function animLoop() {
            updateSpine();
            drawMouse();
        }

        // Init positions
        for (let i = 0; i < TOTAL_SEGS; i++) {
            spine[i].x = canvas.width / 2;
            spine[i].y = canvas.height / 2 + i * SEG_LEN;
        }

        animLoop();
    })();
    </script>

</body>
